services:
  postgres:
    image: postgres:16-alpine
    container_name: foxinburg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foxinburg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-foxinburg}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foxinburg} -d ${POSTGRES_DB:-foxinburg}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foxinburg

  redis:
    image: redis:7-alpine
    container_name: foxinburg-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_env}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foxinburg

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: foxinburg-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-foxinburg}:${POSTGRES_PASSWORD:-change_me_in_env}@postgres:5432/${POSTGRES_DB:-foxinburg}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_env}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_me_in_env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_env}
      FRONTEND_URL: https://foxinburg.ru
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - foxinburg

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foxinburg-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads_data:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - foxinburg

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  foxinburg:
    driver: bridge
