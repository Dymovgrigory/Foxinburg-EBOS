[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
pythonpath = .
filterwarnings =
    # Устаревший импорт multipart в starlette (нельзя обновить starlette из-за fastapi)
    ignore::PendingDeprecationWarning:starlette\.formparsers
    # Предупреждения SWIG из PyMuPDF при импорте fitz
    ignore:builtin type SwigPy.* has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
