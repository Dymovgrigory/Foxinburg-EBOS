services:
  postgres:
    image: postgres:16-alpine
    container_name: foxinburg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foxinburg
      POSTGRES_PASSWORD: foxinburg_dev_pass
      POSTGRES_DB: foxinburg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxinburg -d foxinburg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foxinburg-redis
    restart: unless-stopped
    command: redis-server --requirepass foxinburg_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "foxinburg_redis_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
